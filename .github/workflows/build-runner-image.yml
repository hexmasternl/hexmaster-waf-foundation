name: Build runner image

on:
  push:
    branches:
      - main
    paths:
      - 'infra/runner-image/**'
      - '.github/workflows/build-runner-image.yml'
  workflow_dispatch:
    inputs:
      acr_name:
        description: Optional Azure Container Registry resource name override.
        required: false
        type: string
      image_tag:
        description: Image tag to apply.
        required: true
        default: latest
        type: string

concurrency:
  group: runner-image-build
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ github.event.inputs.acr_name || vars.ACR_NAME || vars.AZURE_CONTAINER_REGISTRY_NAME }}
  IMAGE_REPOSITORY: github-actions-runner
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

jobs:
  build-and-push:
    name: Build and push runner image
    runs-on: ubuntu-latest
    environment: landing-zone-dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR name
        id: acr
        shell: bash
        run: |
          ACR_NAME="${{ env.ACR_NAME }}"
          if [ -z "$ACR_NAME" ]; then
            echo "::error::Set vars.ACR_NAME or vars.AZURE_CONTAINER_REGISTRY_NAME, or provide the workflow_dispatch acr_name override."
            exit 1
          fi
          echo "name=$ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: Build and push to ACR
        shell: bash
        run: |
          az acr build \
            --registry "${{ steps.acr.outputs.name }}" \
            --image "$IMAGE_REPOSITORY:$IMAGE_TAG" \
            --image "$IMAGE_REPOSITORY:${{ github.sha }}" \
            ./infra/runner-image

      - name: Write build summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Runner Image Build

          | Property | Value |
          | --- | --- |
          | **Registry** | `${{ steps.acr.outputs.name }}.azurecr.io` |
          | **Repository** | `${{ env.IMAGE_REPOSITORY }}` |
          | **Tags** | `${{ env.IMAGE_TAG }}`, `${{ github.sha }}` |
          | **Source** | `infra/runner-image/` |
          EOF
